<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedge Volume Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>📐Cylindrical Wedge Calculator</h2>
    <p>Calculate the volume of a cylindrical wedge.</p>
    
    <div class="input-group">
        <label>Radius (r) cm</label>
        <input type="number" id="radius" placeholder="e.g. 5" step="any">
    </div>
    
    <div class="input-group">
        <label>Height (h) cm</label>
        <input type="number" id="height" placeholder="e.g. 12" step="any">
    </div>
    
    <button onclick="calculate()">Calculate Now</button>

    <div id="result">
        <div class="label">VOLUME RESULT</div>
        <div class="value"><span id="volumeValue">0</span> cm³</div>
    </div>
</div>

<script>
    function calculate() {
        const r = parseFloat(document.getElementById('radius').value);
        const h = parseFloat(document.getElementById('height').value);
        
        if (r > 0 && h > 0) {
            const volume = (2/3) * Math.pow(r, 2) * h;
            document.getElementById('volumeValue').innerText = volume.toFixed(4);
            document.getElementById('result').style.display = 'block';
        } else {
            alert("Please enter positive numbers.");
        }
    }
</script>

</body>
</html>
